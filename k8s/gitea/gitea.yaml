# Git server LOCAL dentro do K3s (Gitea). Sem GitHub, 100% offline.
# - ArgoCD (pods) clona via DNS interno: http://gitea.git.svc.cluster.local:3000
# - Você (host/WSL) faz push via NodePort:  http://localhost:30300
#
# DEMO: SQLite + PVC local-path. Não é HA, mas serve pro lab.
---
apiVersion: v1
kind: Namespace
metadata:
  name: git
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: git
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
  # K3s já traz o provisioner "local-path" como StorageClass default.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: git
  labels:
    app: gitea
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: gitea
          image: gitea/gitea:1.22
          imagePullPolicy: IfNotPresent
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__security__INSTALL_LOCK
              value: "true"          # pula o wizard web de instalação
            - name: GITEA__server__DOMAIN
              value: localhost
            # ROOT_URL = como humanos acessam (NodePort).
            - name: GITEA__server__ROOT_URL
              value: http://localhost:30300/
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: git
  labels:
    app: gitea
spec:
  # NodePort também ganha ClusterIP + DNS interno:
  #   interno (ArgoCD): gitea.git.svc.cluster.local:3000
  #   externo (host):   localhost:30300
  type: NodePort
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30300
