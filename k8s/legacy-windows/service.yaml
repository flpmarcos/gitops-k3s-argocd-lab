apiVersion: v1
kind: Service
metadata:
  name: app-legacy-windows
  namespace: gitops-lab
  labels:
    app: app-legacy-windows
spec:
  type: NodePort
  selector:
    app: app-legacy-windows
  ports:
    - name: http
      port: 80
      targetPort: http   # -> container 80
      nodePort: 30081    # only routes once a Windows pod is actually Running
