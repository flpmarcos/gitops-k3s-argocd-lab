apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-modern-linux
  namespace: gitops-lab
  labels:
    app: app-modern-linux
  annotations:
    # K3s ships Traefik as the default ingress controller.
    ingressClassName: traefik
spec:
  rules:
    # Add to /etc/hosts:  127.0.0.1 modern.local
    - host: modern.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-modern-linux
                port:
                  number: 80
