apiVersion: v1
kind: Secret
metadata:
  name: app-modern-linux-secret
  namespace: gitops-lab
  labels:
    app: app-modern-linux
type: Opaque
# stringData lets you write plain text; Kubernetes base64-encodes it for you.
# DEMO ONLY — never commit real secrets. Use Sealed Secrets / SOPS / Vault in prod.
stringData:
  APP_SECRET: "demo-super-secret-value"
